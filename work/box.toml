[distrobox]
name = "workbox"
image = "ghcr.io/gablank/box-work:latest"
home = "${HOME}/distrobox/workbox/home"
replace = true
pull = true
start_now = true
init = true
timezone = "Europe/Oslo"
root = true
unshare_netns = true
exported_apps = "google-chrome-stable"
pre_init_hooks = "export SHELL=/usr/bin/zsh"
init_hooks = 'rm -f /var/tmp/.${container_user_name}.passwd.initialize && host_hash=$(grep "^${container_user_name}:" /run/host/etc/shadow | cut -d: -f2) && usermod -p "$host_hash" ${container_user_name} && bash /usr/local/share/box-init/init-root.sh ${container_user_name} && su - ${container_user_name} -c "bash /usr/local/share/box-init/init-user.sh"'
additional_flags = "--security-opt seccomp=unconfined --device /dev/net/tun --cap-add NET_ADMIN --cap-add NET_RAW"

# Directories — auto-created on host by "box assemble", emitted as volume= lines
[[mount-dir]]
host = "${HOME}/distrobox/workbox/tailscale"
container = "/var/lib/tailscale"
options = "rw,z"

# Workbox runs its own rootless podman (see work/Containerfile) so containers
# spawned via docker/compose live in workbox's netns. The host podman socket
# is intentionally NOT mounted here; priv still uses it.
