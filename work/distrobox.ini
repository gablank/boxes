[workbox]
name=workbox
image=ghcr.io/gablank/box-work:latest
home=/home/awenhaug/distrobox/workbox/home
replace=true
pull=true
start_now=true
init=false
exported_apps="google-chrome-stable"
volume=/run/user/1000/podman/podman.sock:/podman.sock:rw
pre_init_hooks=export SHELL=/usr/bin/zsh
init_hooks=su - awenhaug -c "bash /usr/local/share/box-init/init-user.sh"
