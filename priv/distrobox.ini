[privbox]
name=privbox
image=ghcr.io/gablank/box-priv:latest
home=/home/awenhaug/distrobox/privbox/home
replace=true
pull=true
start_now=true
init=false
volume=/run/user/1000/podman/podman.sock:/podman.sock:rw
pre_init_hooks=export SHELL=/usr/bin/zsh
init_hooks=su - awenhaug -c "bash /usr/local/share/box-init/init-user.sh"
