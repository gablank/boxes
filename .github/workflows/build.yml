name: Build box images

on:
  schedule:
    - cron: "0 3 * * *"
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  OWNER: gablank

jobs:
  build-base:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      date_tag: ${{ steps.meta.outputs.date_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Set build metadata
        id: meta
        run: echo "date_tag=$(date +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Containerfile.base
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/box-base:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/box-base:${{ steps.meta.outputs.date_tag }}
          build-args: |
            BUILD_DATE=${{ steps.meta.outputs.date_tag }}
            BUILD_SHA=${{ github.sha }}
          cache-from: type=gha,scope=base
          cache-to: type=gha,mode=max,scope=base

  build-boxes:
    needs: build-base
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        box: [priv, work]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.box }}/Containerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/box-${{ matrix.box }}:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/box-${{ matrix.box }}:${{ needs.build-base.outputs.date_tag }}
          build-args: |
            BUILD_DATE=${{ needs.build-base.outputs.date_tag }}
            BUILD_SHA=${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.box }}
          cache-to: type=gha,mode=max,scope=${{ matrix.box }}

  cleanup:
    needs: build-boxes
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Delete image versions older than 14 days
        uses: actions/github-script@v7
        with:
          script: |
            const images = ['box-base', 'box-priv', 'box-work'];
            const keepDays = 14;
            const cutoff = new Date(Date.now() - keepDays * 86400000);

            for (const image of images) {
              let versions;
              try {
                versions = await github.rest.packages.getAllPackageVersionsForPackageOwnedByUser({
                  package_type: 'container',
                  package_name: image,
                  username: '${{ env.OWNER }}',
                });
              } catch (e) {
                console.log(`Skipping ${image}: ${e.message}`);
                continue;
              }

              for (const version of versions.data) {
                const updatedAt = new Date(version.updated_at);
                const tags = version.metadata?.container?.tags || [];
                if (updatedAt < cutoff && !tags.includes('latest')) {
                  console.log(`Deleting ${image} version ${version.id} (tags: ${tags.join(', ')})`);
                  try {
                    await github.rest.packages.deletePackageVersionForUser({
                      package_type: 'container',
                      package_name: image,
                      username: '${{ env.OWNER }}',
                      package_version_id: version.id,
                    });
                  } catch (e) {
                    console.log(`  Failed: ${e.message}`);
                  }
                }
              }
            }
