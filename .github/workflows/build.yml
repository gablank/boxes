name: Build box images

on:
  schedule:
    - cron: "0 3 * * *"
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Smoke-test completions output
        run: |
          bash bin/box completions bash > /tmp/box_bash.txt
          bash bin/box completions zsh  > /tmp/box_zsh.txt

          # Extract commands from _BOX_COMMANDS array in bin/box
          mapfile -t declared < <(
            grep -oP "(?<=_BOX_COMMANDS=\()[^)]*" bin/box \
              | tr ' ' '\n' | tr -d '()' | grep -v '^$'
          )

          # Verify every declared command appears in bash completions
          missing=()
          for cmd in "${declared[@]}"; do
            grep -q "$cmd" /tmp/box_bash.txt || missing+=("$cmd")
          done
          if [[ ${#missing[@]} -gt 0 ]]; then
            printf "ERROR: commands missing from bash completions: %s\n" "${missing[*]}"
            exit 1
          fi

          # Verify every declared command appears in zsh completions
          missing=()
          for cmd in "${declared[@]}"; do
            grep -q "$cmd" /tmp/box_zsh.txt || missing+=("$cmd")
          done
          if [[ ${#missing[@]} -gt 0 ]]; then
            printf "ERROR: commands missing from zsh completions: %s\n" "${missing[*]}"
            exit 1
          fi

      - name: Verify _BOX_COMMANDS matches case dispatch
        run: |
          # Extract commands from _BOX_COMMANDS array
          mapfile -t declared < <(
            grep -oP "(?<=_BOX_COMMANDS=\()[^)]*" bin/box \
              | tr ' ' '\n' | tr -d '()' | grep -v '^$'
          )

          # Extract commands from case dispatch block (lines matching word followed by )
          mapfile -t dispatched < <(
            awk '/^case "\$command" in/,/^esac/' bin/box \
              | grep -oP '^\s+\K[a-z][a-z0-9-]+(?=\))' \
              | grep -v '^-'
          )

          # Check every dispatched command is in _BOX_COMMANDS
          missing=()
          for cmd in "${dispatched[@]}"; do
            found=false
            for d in "${declared[@]}"; do
              [[ "$d" == "$cmd" ]] && found=true && break
            done
            $found || missing+=("$cmd")
          done
          if [[ ${#missing[@]} -gt 0 ]]; then
            printf "ERROR: case dispatch has commands not in _BOX_COMMANDS: %s\n" "${missing[*]}"
            printf "Add them to _BOX_COMMANDS in bin/box\n"
            exit 1
          fi

          printf "OK: all dispatched commands present in _BOX_COMMANDS\n"

  changes:
    runs-on: ubuntu-latest
    outputs:
      date_tag: ${{ steps.meta.outputs.date_tag }}
      build_base: ${{ steps.result.outputs.build_base }}
      box_matrix: ${{ steps.result.outputs.box_matrix }}
    steps:
      - uses: actions/checkout@v4

      - name: Set build metadata
        id: meta
        run: echo "date_tag=$(date -u +%Y-%m-%dT%H%M)" >> "$GITHUB_OUTPUT"

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            base:
              - 'Containerfile.base'
              - 'scripts/**'
              - 'local-bin/**'
            priv:
              - 'priv/**'
            work:
              - 'work/**'

      - name: Compute build flags
        id: result
        run: |
          force="${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}"
          base="${{ steps.filter.outputs.base }}"
          priv="${{ steps.filter.outputs.priv }}"
          work="${{ steps.filter.outputs.work }}"

          [[ "$force" == "true" ]] && base=true && priv=true && work=true

          boxes=()
          [[ "$base" == "true" || "$priv" == "true" ]] && boxes+=('"priv"')
          [[ "$base" == "true" || "$work" == "true" ]] && boxes+=('"work"')

          echo "build_base=$base" >> "$GITHUB_OUTPUT"
          echo "box_matrix=[$(IFS=,; echo "${boxes[*]}")]" >> "$GITHUB_OUTPUT"

  build-base:
    needs: changes
    if: needs.changes.outputs.build_base == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Containerfile.base
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/box-base:latest
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/box-base:${{ needs.changes.outputs.date_tag }}
          build-args: |
            BUILD_DATE=${{ needs.changes.outputs.date_tag }}
            BUILD_SHA=${{ github.sha }}
          cache-from: type=gha,scope=base
          cache-to: type=gha,mode=max,scope=base

  build-boxes:
    needs: [changes, build-base]
    if: always() && !failure() && !cancelled() && needs.changes.outputs.box_matrix != '[]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        box: ${{ fromJson(needs.changes.outputs.box_matrix) }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.box }}/Containerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/box-${{ matrix.box }}:latest
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/box-${{ matrix.box }}:${{ needs.changes.outputs.date_tag }}
          build-args: |
            BUILD_DATE=${{ needs.changes.outputs.date_tag }}
            BUILD_SHA=${{ github.sha }}
            BASE_IMAGE=${{ env.REGISTRY }}/${{ github.repository_owner }}/box-base:latest
          cache-from: type=gha,scope=${{ matrix.box }}
          cache-to: type=gha,mode=max,scope=${{ matrix.box }}

  cleanup:
    needs: [build-base, build-boxes]
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Delete image versions older than 14 days
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const images = ['box-base', 'box-priv', 'box-work'];
            const keepDays = 14;
            const cutoff = new Date(Date.now() - keepDays * 86400000);

            for (const image of images) {
              let versions;
              try {
                versions = await github.rest.packages.getAllPackageVersionsForPackageOwnedByUser({
                  package_type: 'container',
                  package_name: image,
                  username: owner,
                });
              } catch (e) {
                console.log(`Skipping ${image}: ${e.message}`);
                continue;
              }

              for (const version of versions.data) {
                const updatedAt = new Date(version.updated_at);
                const tags = version.metadata?.container?.tags || [];
                if (updatedAt < cutoff && !tags.includes('latest')) {
                  console.log(`Deleting ${image} version ${version.id} (tags: ${tags.join(', ')})`);
                  try {
                    await github.rest.packages.deletePackageVersionForUser({
                      package_type: 'container',
                      package_name: image,
                      username: owner,
                      package_version_id: version.id,
                    });
                  } catch (e) {
                    console.log(`  Failed: ${e.message}`);
                  }
                }
              }
            }
